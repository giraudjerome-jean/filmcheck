<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FilmCheck</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:black;
  color:white;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:40px;
}

input {
  width:70%;
  padding:15px;
  font-size:18px;
}

button {
  padding:15px;
}

.card {
  margin-top:40px;
  padding:20px;
  border:1px solid #333;
}

.score {
  font-size:60px;
}

.green { color:#78b488; }
.yellow { color:#d4bd62; }
.orange { color:#be8353; }
.red { color:#c56666; }

.person {
  border-top:1px solid #333;
  padding:10px 0;
}

.source {
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>FilmCheck</h1>

<form id="form">
<input id="input" placeholder="Tape un film..." />
<button>Search</button>
</form>

<div id="result"></div>

</div>

<script>
const CACHE_KEY = "film_cache_v1";

function slugify(str){
  return str.toLowerCase().replace(/[^a-z0-9]/g,"");
}

function getCache(){
  return JSON.parse(localStorage.getItem(CACHE_KEY)||"{}");
}

function saveCache(data){
  const cache = getCache();
  cache[slugify(data.title)] = data;
  localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
}

function getFromCache(title){
  const cache = getCache();
  return cache[slugify(title)];
}

function color(score){
  if(score<20) return "green";
  if(score<45) return "yellow";
  if(score<70) return "orange";
  return "red";
}

function render(data){
  const tone = color(data.vigilance_index);

  document.getElementById("result").innerHTML = `
    <div class="card">
      <h2>${data.title}</h2>
      <div class="score ${tone}">
        ${data.vigilance_index}/100
      </div>
      <p>${data.hero_note}</p>

      <h3>People</h3>
      ${data.people.map(p=>`
        <div class="person">
          <b>${p.name}</b> – ${p.role}<br>
          ${p.desc}
        </div>
      `).join("")}

      <h3>Sources</h3>
      ${data.sources.map(s=>`
        <div class="source">
          <a href="${s.url}" target="_blank">${s.title}</a>
        </div>
      `).join("")}
    </div>
  `;
}

async function search(title){

  const cached = getFromCache(title);
  if(cached){
    render(cached);
    return;
  }

  const res = await fetch("/api/analyze",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({title})
  });

  const data = await res.json();

  saveCache(data);
  render(data);
}

document.getElementById("form").addEventListener("submit",(e)=>{
  e.preventDefault();
  const val = document.getElementById("input").value.trim();
  if(!val) return;
  search(val);
});
</script>

</body>
</html>
